      <!-- Auth Buttons (Droite) —— temporairement masqués pour le déploiement -->
    <div class="flex items-center gap-4">
      <!-- Bouton de changement de langue -->
      <button (click)="switchLanguage()" 
        class="px-3 py-1.5 text-[#9090c0] hover:text-[#00f5ff] hover:bg-[#00f5ff]/10 transition-all duration-300 text-sm font-medium border border-[#00f5ff]/30 hover:border-[#00f5ff] rounded-lg" style="box-shadow: 0 0 8px rgba(0,245,255,0.1)">
        {{ currentLang === 'fr' ? 'EN' : 'FR' }}
      </button>

      <!-- Bouton Dark / Light theme -->
      <button (click)="themeService.toggle()"
        title="Changer de thème"
        class="px-3 py-1.5 transition-all duration-300 text-sm font-medium border rounded-lg flex items-center gap-1.5 text-[#9090c0] hover:text-[#00f5ff] hover:bg-[#00f5ff]/10 border-[#00f5ff]/30 hover:border-[#00f5ff]"
        style="box-shadow: 0 0 8px rgba(0,245,255,0.1)">
        <!-- Icône Soleil (light) -->
        <svg *ngIf="!themeService.isDark()" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>

      <ng-template #notAuthenticated>
        <a routerLink="/login"
