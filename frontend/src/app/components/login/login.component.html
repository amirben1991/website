<div class="h-full flex items-center justify-center bg-gradient-to-br from-[#050510] via-[#08081a] to-[#0d0d20] py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-[#0d0d20]/80 backdrop-blur-sm p-8 rounded-2xl shadow-card border border-[#00f5ff]/10 animate-fade-in-up">
    <div class="text-center">
      <h2 class="text-3xl font-bold">
        <span class="bg-gradient-to-r from-[#00f5ff] to-[#bf00ff] bg-clip-text text-transparent">Connexion</span>
      </h2>
      <div class="w-16 h-1 bg-gradient-to-r from-[#00f5ff] to-[#bf00ff] mx-auto rounded-full mt-4"></div>
    </div>
    
    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-[#6666aa] mb-2">Nom d'utilisateur</label>
          <input
            id="username"
            formControlName="username"
            type="text"
            required
            class="w-full px-4 py-3 bg-[#050510] border border-[#00f5ff]/20 rounded-xl text-white placeholder-[#555580] focus:outline-none focus:border-[#00f5ff] focus:ring-2 focus:ring-[#00f5ff]/20 transition-all duration-300"
            placeholder="Entrez votre nom d'utilisateur"
          />
          <div *ngIf="username?.invalid && username?.touched" class="text-red-400 text-sm mt-2">
            <span *ngIf="username?.errors?.['required']">Le nom d'utilisateur est requis</span>
            <span *ngIf="username?.errors?.['minlength']">Minimum 3 caractères</span>
          </div>
        </div>
        
        <div>
          <label for="password" class="block text-sm font-medium text-[#6666aa] mb-2">Mot de passe</label>
          <input
            id="password"
            formControlName="password"
            type="password"
            required
            class="w-full px-4 py-3 bg-[#050510] border border-[#00f5ff]/20 rounded-xl text-white placeholder-[#555580] focus:outline-none focus:border-[#00f5ff] focus:ring-2 focus:ring-[#00f5ff]/20 transition-all duration-300"
            placeholder="Entrez votre mot de passe"
          />
          <div *ngIf="password?.invalid && password?.touched" class="text-red-400 text-sm mt-2">
            <span *ngIf="password?.errors?.['required']">Le mot de passe est requis</span>
            <span *ngIf="password?.errors?.['minlength']">Minimum 6 caractères</span>
          </div>
        </div>
      </div>

      <div *ngIf="errorMessage" class="bg-red-500/10 border border-red-500/30 rounded-lg p-3 text-red-400 text-sm text-center">
        {{ errorMessage }}
      </div>

      <div>
        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading"
          class="w-full py-3 px-4 bg-gradient-to-r from-[#00f5ff] to-[#00ccdd] hover:from-[#00ccdd] hover:to-[#0099bb] text-white font-medium rounded-xl shadow-lg hover:shadow-glow disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300"
        >
          <span *ngIf="!isLoading">Se connecter</span>
          <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            Connexion...
          </span>
        </button>
      </div>

      <div class="text-center mt-6 pt-6 border-t border-[#00f5ff]/10">
        <span class="text-[#6666aa]">Pas encore de compte ? </span>
        <a routerLink="/register" class="font-semibold text-[#00f5ff] hover:text-[#66ffff] transition-colors duration-300">
          S'inscrire
        </a>
      </div>
    </form>
  </div>
</div>
