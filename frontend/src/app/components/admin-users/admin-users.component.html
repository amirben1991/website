<div class="min-h-screen bg-gray-50 py-8 px-4">
  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">User Management</h1>
      <p class="text-gray-600 mt-2">Manage all registered users</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
      <p class="text-red-800">{{ error }}</p>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="text-center py-12">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
      <p class="text-gray-600 mt-4">Loading users...</p>
    </div>

    <!-- Users Table -->
    <div *ngIf="!loading" class="bg-white rounded-lg shadow overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              Username
            </th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              Email
            </th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              Role
            </th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              ID
            </th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
              Actions
            </th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let user of users" class="hover:bg-gray-50">
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm font-medium text-gray-900">{{ user.username }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-600">{{ user.email }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span 
                class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full"
                [class.bg-purple-100]="user.role === 'ADMIN'"
                [class.text-purple-800]="user.role === 'ADMIN'"
                [class.bg-green-100]="user.role === 'USER'"
                [class.text-green-800]="user.role === 'USER'">
                {{ user.role }}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-xs text-gray-400 font-mono">{{ user.id }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
              <button
                (click)="deleteUser(user.id, user.username)"
                class="font-medium transition-colors"
                [class.text-red-600]="!isCurrentUser(user)"
                [class.hover:text-red-900]="!isCurrentUser(user)"
                [class.text-gray-400]="isCurrentUser(user)"
                [class.cursor-not-allowed]="isCurrentUser(user)"
                [disabled]="loading || isCurrentUser(user)">
                {{ isCurrentUser(user) ? 'You' : 'Delete' }}
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Empty State -->
      <div *ngIf="users.length === 0" class="text-center py-12">
        <p class="text-gray-500">No users found</p>
      </div>
    </div>

    <!-- Stats -->
    <div *ngIf="!loading && users.length > 0" class="mt-4 text-sm text-gray-600">
      Total users: {{ users.length }} 
      ({{ adminCount }} admins, {{ userCount }} users)
    </div>
  </div>
</div>
