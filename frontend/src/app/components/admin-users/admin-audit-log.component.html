<div class="mt-10">
  <h2 class="text-2xl font-bold mb-4">Audit Log</h2>

  <div *ngIf="error" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
    <p class="text-red-800">{{ error }}</p>
  </div>

  <div *ngIf="loading" class="text-center py-8">
    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
    <p class="text-gray-600 mt-2">Loading audit logs...</p>
  </div>

  <div *ngIf="!loading && logs.length > 0" class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200 bg-white rounded-lg shadow">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Admin</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Action</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Target</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Details</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let log of logs">
          <td class="px-4 py-2 whitespace-nowrap">{{ log.timestamp | date:'short' }}</td>
          <td class="px-4 py-2 whitespace-nowrap">{{ log.adminUsername }}</td>
          <td class="px-4 py-2 whitespace-nowrap">{{ log.action }}</td>
          <td class="px-4 py-2 whitespace-nowrap">{{ log.targetUsername }}</td>
          <td class="px-4 py-2">{{ log.details }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading && logs.length === 0" class="text-gray-500 mt-4">
    No audit log entries found.
  </div>
</div>
