<div class="h-full bg-[#050510] py-12 overflow-y-auto">
  <div class="max-w-4xl mx-auto px-8">

    <h1 class="text-4xl font-bold text-white mb-12 text-center animate-fade-in-up">
      <span class="bg-gradient-to-r from-[#00f5ff] to-[#bf00ff] bg-clip-text text-transparent">Articles</span>
    </h1>

    <!-- Liste d'articles -->
    <div *ngIf="articles.length > 0; else noArticles" class="space-y-6">
      <a *ngFor="let article of articles; let i = index"
        [href]="article.url" target="_blank" rel="noopener noreferrer"
        class="block bg-[#0d0d20]/80 backdrop-blur-sm rounded-xl p-6 border border-[#00f5ff]/10 hover:border-[#00f5ff]/40 shadow-card hover:shadow-card-hover transition-all duration-300 group animate-fade-in-up"
        [style.animation-delay]="(i * 0.08) + 's'">
        <div class="flex items-start gap-4">
          <img *ngIf="article.logo" [src]="article.logo" [alt]="article.title"
            class="w-8 h-8 rounded object-contain flex-shrink-0 mt-1" />
          <div class="flex-1 min-w-0">
            <h2 class="text-lg font-semibold text-white group-hover:text-[#00f5ff] transition-colors duration-300 mb-1">
              {{ article.title }}
            </h2>
            <p class="text-[#9090c0] text-sm mb-3 leading-relaxed">{{ article.summary }}</p>
            <div class="flex items-center gap-3 flex-wrap">
              <span class="text-[#6666aa] text-xs">{{ article.date }}</span>
              <span *ngFor="let tag of article.tags"
                class="px-2 py-0.5 bg-[#00f5ff]/10 border border-[#00f5ff]/20 text-[#00f5ff] text-xs rounded-full">
                {{ tag }}
              </span>
            </div>
          </div>
          <!-- Flèche externe -->
          <svg class="w-5 h-5 text-[#6666aa] group-hover:text-[#00f5ff] transition-colors duration-300 flex-shrink-0 mt-1" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
          </svg>
        </div>
      </a>
    </div>

    <!-- État vide -->
    <ng-template #noArticles>
      <div class="text-center py-20 animate-fade-in-up">
        <p class="text-[#6666aa] text-lg mb-2">Aucun article pour le moment.</p>
        <p class="text-[#6666aa]/60 text-sm">Les articles arrivent bientôt ✍️</p>
      </div>
    </ng-template>

  </div>
</div>
