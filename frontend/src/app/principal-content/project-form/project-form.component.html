<div class="max-w-2xl mx-auto p-8">
  <h1 class="text-3xl font-bold mb-6">
    {{ isEditMode ? 'Edit Project' : 'Add New Project' }}
  </h1>

  <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">
    
    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
      {{ errorMessage }}
    </div>

    <!-- Title -->
    <div class="mb-4">
      <label class="block text-sm font-medium mb-2">Title *</label>
      <input 
        type="text" 
        formControlName="title" 
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Enter project title"
      />
      <span *ngIf="projectForm.get('title')?.hasError('required') && projectForm.get('title')?.touched" 
        class="text-red-500 text-sm">Title is required</span>
      <span *ngIf="projectForm.get('title')?.hasError('minlength') && projectForm.get('title')?.touched" 
        class="text-red-500 text-sm">Title must be at least 3 characters</span>
    </div>

    <!-- Description -->
    <div class="mb-4">
      <label class="block text-sm font-medium mb-2">Description *</label>
      <textarea 
        formControlName="description" 
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Enter project description"
        rows="4"
      ></textarea>
      <span *ngIf="projectForm.get('description')?.hasError('required') && projectForm.get('description')?.touched" 
        class="text-red-500 text-sm">Description is required</span>
    </div>

    <!-- Tech Stack -->
    <div class="mb-4">
      <label class="block text-sm font-medium mb-2">Tech Stack (comma-separated)</label>
      <input 
        type="text" 
        formControlName="techStack" 
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="e.g., Angular, TypeScript, Node.js"
      />
    </div>

    <!-- GitHub Link -->
    <div class="mb-4">
      <label class="block text-sm font-medium mb-2">GitHub Link</label>
      <input 
        type="url" 
        formControlName="githubLink" 
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="https://github.com/user/repo"
      />
    </div>

    <!-- Live URL -->
    <div class="mb-4">
      <label class="block text-sm font-medium mb-2">Live URL</label>
      <input 
        type="url" 
        formControlName="liveUrl" 
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="https://example.com"
      />
    </div>

    <!-- Image URL -->
    <div class="mb-4">
      <label class="block text-sm font-medium mb-2">Image URL</label>
      <input 
        type="url" 
        formControlName="imageUrl" 
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="https://example.com/image.jpg"
      />
    </div>

    <!-- Featured Checkbox -->
    <div class="mb-6">
      <label class="flex items-center">
        <input 
          type="checkbox" 
          formControlName="featured" 
          class="mr-2"
        />
        <span class="text-sm font-medium">Mark as Featured</span>
      </label>
    </div>

    <!-- Buttons -->
    <div class="flex gap-4">
      <button 
        type="submit" 
        [disabled]="isLoading"
        class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 disabled:bg-gray-400"
      >
        {{ isLoading ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
      </button>
      <button 
        type="button" 
        (click)="onCancel()"
        class="px-6 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400"
      >
        Cancel
      </button>
    </div>
  </form>
</div>
