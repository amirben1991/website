<div class="h-full bg-gradient-dark py-12 overflow-y-auto">
  <div class="max-w-6xl mx-auto px-8">
    <h1 class="text-4xl font-bold text-[#f8fafc] mb-12 text-center animate-fade-in-up text-high-contrast">Mes Projets</h1>
    <div class="mb-8 animate-fade-in" style="animation-delay: 0.2s;">
      <a *ngIf="authService.isAdmin()" [routerLink]="['/projects', 'new']" class="inline-block px-6 py-2 bg-[#60a5fa] text-white rounded-lg hover:bg-[#3b82f6] hover:shadow-glow transition-all duration-300 btn-hover">
        + Ajouter un projet
      </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" *ngIf="projects$ | async as projects">
      <div *ngFor="let project of projects; let i = index" 
           class="bg-gradient-card rounded-xl shadow-card overflow-hidden hover:shadow-card-hover transition-all duration-300 transform hover:-translate-y-2 border-glow animate-fade-in-up"
           [style.animation-delay]="(i * 0.1) + 's'">
        <div *ngIf="project.imageUrl" class="h-48 overflow-hidden bg-[#2d3748]">
          <img [src]="project.imageUrl" [alt]="project.title" class="w-full h-full object-cover transition-transform duration-500 hover:scale-110">
        </div>
        <div class="p-6">
          <div class="flex items-start justify-between mb-3">
            <h2 class="text-xl font-semibold text-[#f8fafc]">{{ project.title }}</h2>
            <span *ngIf="project.featured" class="px-3 py-1 bg-[#60a5fa] bg-opacity-20 text-[#60a5fa] text-xs font-semibold rounded-full animate-pulse-glow">⭐ Featured</span>
          </div>
          <p class="text-[#e2e8f0] mb-4 leading-relaxed">{{ project.description }}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            <span *ngFor="let tech of project.techStack?.split(',')" 
                  class="inline-block px-3 py-1 bg-[#60a5fa] bg-opacity-15 text-[#60a5fa] text-xs rounded-full border border-[#60a5fa] border-opacity-30 hover:bg-opacity-25 transition-all duration-200">
              {{ tech.trim() }}
            </span>
          </div>
          <div class="flex gap-3">
            <a *ngIf="project.githubLink" [href]="project.githubLink" target="_blank" 
               class="flex-1 text-center px-4 py-2 bg-[#60a5fa] text-white rounded-lg hover:bg-[#3b82f6] hover:shadow-glow transition-all duration-300 btn-hover font-medium">
              GitHub
            </a>
            <a *ngIf="project.liveUrl" [href]="project.liveUrl" target="_blank" 
               class="flex-1 text-center px-4 py-2 bg-gradient-to-r from-[#60a5fa] to-[#3b82f6] text-white rounded-lg hover:from-[#3b82f6] hover:to-[#2563eb] hover:shadow-glow transition-all duration-300 font-medium">
              Live Demo
            </a>
            <ng-container *ngIf="authService.isAdmin()">
              <a [routerLink]="['/projects', project.id, 'edit']" class="flex-1 text-center px-4 py-2 bg-[#f59e0b] text-white rounded hover:bg-[#d97706] transition">
                Edit
              </a>
              <button 
                type="button" 
                (click)="deleteProject(project.id)"
                class="flex-1 px-4 py-2 bg-[#60a5fa] text-white rounded hover:bg-[#3b82f6] transition">
                Delete
              </button>
            </ng-container>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
