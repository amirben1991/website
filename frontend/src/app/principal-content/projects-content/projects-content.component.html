<div class="h-full bg-[#2d3748] py-12 overflow-y-auto">
  <div class="max-w-6xl mx-auto px-8">
    <h1 class="text-4xl font-bold text-[#f1f5f9] mb-12">My Projects</h1>
    <div class="mb-8">
      <a *ngIf="authService.isAdmin()" [routerLink]="['/projects', 'new']" class="inline-block px-6 py-2 bg-[#60a5fa] text-white rounded-lg hover:bg-[#3b82f6] transition">
        + Add New Project
      </a>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" *ngIf="projects$ | async as projects">
      <div *ngFor="let project of projects" class="bg-[#3f4b5d] rounded-lg shadow-md overflow-hidden hover:shadow-xl transition transform hover:-translate-y-1 border border-[#60a5fa] border-opacity-20">
        <div *ngIf="project.imageUrl" class="h-48 overflow-hidden bg-[#2d3748]">
          <img [src]="project.imageUrl" [alt]="project.title" class="w-full h-full object-cover">
        </div>
        <div class="p-6">
          <div class="flex items-start justify-between mb-2">
            <h2 class="text-xl font-semibold text-[#f1f5f9]">{{ project.title }}</h2>
            <span *ngIf="project.featured" class="px-3 py-1 bg-[#60a5fa] bg-opacity-20 text-[#60a5fa] text-xs font-semibold rounded-full">⭐ Featured</span>
          </div>
          <p class="text-[#e2e8f0] mb-4">{{ project.description }}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            <span *ngFor="let tech of project.techStack?.split(',')" class="inline-block px-2 py-1 bg-[#60a5fa] bg-opacity-20 text-[#60a5fa] text-xs rounded">
              {{ tech.trim() }}
            </span>
          </div>
          <div class="flex gap-3">
            <a *ngIf="project.githubLink" [href]="project.githubLink" target="_blank" class="flex-1 text-center px-4 py-2 bg-[#60a5fa] text-white rounded hover:bg-[#3b82f6] transition">
              GitHub
            </a>
            <a *ngIf="project.liveUrl" [href]="project.liveUrl" target="_blank" class="flex-1 text-center px-4 py-2 bg-[#60a5fa] text-white rounded hover:bg-[#3b82f6] transition">
              Live Demo
            </a>
                        <ng-container *ngIf="authService.isAdmin()">
              <a [routerLink]="['/projects', project.id, 'edit']" class="flex-1 text-center px-4 py-2 bg-[#f59e0b] text-white rounded hover:bg-[#d97706] transition">
                Edit
              </a>
              <button 
                type="button" 
                (click)="deleteProject(project.id)"
                class="flex-1 px-4 py-2 bg-[#ef4444] text-white rounded hover:bg-[#dc2626] transition">
                Delete
              </button>
            </ng-container>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="!(projects$ | async)" class="text-center py-12">
      <p class="text-[#cbd5e1]">Loading projects...</p>
    </div>
  </div>
</div>
