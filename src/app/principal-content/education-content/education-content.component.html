<div class="min-h-screen bg-gray-50 py-12">
  <div class="max-w-4xl mx-auto px-4">
    <h1 class="text-4xl font-bold text-gray-900 mb-12">Education & Certifications</h1>
    
    <div class="space-y-6" *ngIf="education$ | async as education">
      <div *ngFor="let item of education" class="bg-white p-6 rounded-lg shadow-md border-l-4 border-indigo-600">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h2 class="text-2xl font-semibold text-gray-900">{{ item.degree }}</h2>
            <p class="text-lg text-indigo-600 font-medium">{{ item.school }}</p>
          </div>
          <span class="text-sm text-gray-500 whitespace-nowrap">
            {{ item.startDate | date: 'MMM yyyy' }} - 
            {{ item.endDate ? (item.endDate | date: 'MMM yyyy') : 'Present' }}
          </span>
        </div>
        <p class="text-gray-700 mb-3">📚 <strong>Field:</strong> {{ item.field }}</p>
        <p class="text-gray-600">{{ item.description }}</p>
      </div>
    </div>

    <div *ngIf="!(education$ | async)" class="text-center py-12">
      <p class="text-gray-500">Loading education data...</p>
    </div>
  </div>
</div>
