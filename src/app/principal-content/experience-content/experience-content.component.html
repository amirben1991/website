<div class="min-h-screen bg-gray-50 py-12">
  <div class="max-w-4xl mx-auto px-4">
    <h1 class="text-4xl font-bold text-gray-900 mb-12">Professional Experience</h1>
    
    <div class="space-y-6" *ngIf="experience$ | async as experiences">
      <div *ngFor="let job of experiences" class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-600">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h2 class="text-2xl font-semibold text-gray-900">{{ job.position }}</h2>
            <p class="text-lg text-blue-600 font-medium">{{ job.company }}</p>
          </div>
          <span class="text-sm text-gray-500 whitespace-nowrap">
            {{ job.startDate | date: 'MMM yyyy' }} - 
            {{ job.endDate ? (job.endDate | date: 'MMM yyyy') : 'Present' }}
          </span>
        </div>
        <p class="text-gray-600 mb-4">{{ job.description }}</p>
        <div class="flex flex-wrap gap-2">
          <span *ngFor="let tech of job.techStack" class="inline-block px-3 py-1 bg-blue-100 text-blue-800 text-sm rounded-full">
            {{ tech }}
          </span>
        </div>
      </div>
    </div>

    <div *ngIf="!(experience$ | async)" class="text-center py-12">
      <p class="text-gray-500">Loading experience data...</p>
    </div>
  </div>
</div>
