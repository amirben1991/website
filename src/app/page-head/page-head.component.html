<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link href="./page-head.component.scss" rel="stylesheet">
  <title>Hello World</title>
</head>
<body>

  <div class="page-head-card">
    <div>
      <img [src]="imageUrl" [alt]="title">
    </div>

    <div id="user-input-button">
      <button (click)="getUserInput()">What's your name</button>
    </div>

    <!--TODO: find a way to center the utilisateur-input tag-->
      
      <span>
        <h1 class="text-3xl font-bold underline">
          Hello world!
        </h1>
      </span>
      <span id="utilisateur-input">
          <p>{{ userInput }}</p>
        </span>

        <span id="title">
          <h2>{{ title }}</h2>
        </span>

        <span id="description">
          <p>{{ description }}</p>
        </span>

  </div>

</body>
</html>
