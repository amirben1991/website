# Server
server.port=8081

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio
spring.datasource.username=portfolio_user
spring.datasource.password=portfolio_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 console (not needed with PostgreSQL)
spring.h2.console.enabled=false

# OpenAI API Key
openai.api.key=${OPENAI_API_KEY}

# JWT Secret (set JWT_SECRET env var in prod)
jwt.secret=${JWT_SECRET:change-this-secret-in-prod}

# Actuator (health checks for Docker/K8s)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized