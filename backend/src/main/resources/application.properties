# Server
server.port=8081

# PostgreSQL Database
# spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio
# spring.datasource.username=portfolio_user
# spring.datasource.password=portfolio_pass
# spring.datasource.driver-class-name=org.postgresql.Driver

# Active H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 console (not needed with PostgreSQL)
spring.h2.console.enabled=false

# Load local overrides if present (gitignored)
spring.config.import=optional:classpath:application-local.properties

# OpenAI API Key (set in application-local.properties or via OPENAI_API_KEY env var)
openai.api.key=${OPENAI_API_KEY:}

# JWT Secret (set JWT_SECRET env var in prod)
jwt.secret=${JWT_SECRET:change-this-secret-in-prod-min32chars!!}

# Actuator (health checks for Docker/K8s)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized