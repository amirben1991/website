# Server
server.port=8081

# PostgreSQL Database (overrideable via env vars in Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:portfolio_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:portfolio_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.h2.console.enabled=false

# JPA/Hibernate (dialecte auto-détecter par Hibernate selon le datasource)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Load local overrides if present (gitignored)
spring.config.import=optional:classpath:application-local.properties

# OpenAI API Key (set in application-local.properties or via OPENAI_API_KEY env var)
openai.api.key=${OPENAI_API_KEY:}

# JWT Secret (set JWT_SECRET env var in prod)
jwt.secret=${JWT_SECRET:change-this-secret-in-prod-min32chars!!}

# Actuator (health checks for Docker/K8s)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized